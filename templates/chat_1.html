<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Chat</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      font-family: sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .wrapper {
      width: 80vw;
      height: 80vh;
      display: flex;
      flex-direction: column;
      border: 1px solid rgb(78, 44, 44);
    }

    .header {
      padding: 8px;
      background: #f0f0f0;
      border-bottom: 1px solid #ccc;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .controls {
      display: flex;
    }

    #msg {
      flex: 1;
    }

    input {
      padding: 8px;
      font-size: 1rem;
    }
  </style>
</head>
<body> /*page chat qui de la personne connectée*/
  <div class="wrapper">
    <div class="header">Connecté.e en tant que : <strong>{{ user_name }}</strong></div>
    <div id="messages"></div>
    <div class="controls">
      <input id="msg" placeholder="message (entrée pour envoyer)">
    </div>
  </div>

  <script>
    const messagesDiv = document.getElementById("messages");
    const msgInput = document.getElementById("msg");

    let lastRendered = "";

    function scrollBottom() {
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function render(msgs) { 
      const newRendered = msgs.map(m =>
        "[" + m.user_name + "] " + m.message /*affiche les mesage dans le html avec user name + contenu message*/
      ).join("<br>");

      if (newRendered !== lastRendered) { /*si la liste des messages a changé */
        messagesDiv.innerHTML = newRendered; /*actualise le html*/
        lastRendered = newRendered; /*enregistre la liste*/
        scrollBottom(); /*va en bas*/
      }
    }

    async function poll() {
      const res = await fetch("/poll");
      const data = await res.json();
      render(data.messages);
    }

    async function send() {
      const message = msgInput.value;
      if (!message) return;

      await fetch("/send", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ message })
      });

      msgInput.value = ""; /*quand envoie message on vide la barre de texte*/
      poll();
    }

    msgInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") { /*quand appuie sur enter fait send*/
        e.preventDefault();
        send();
      }
    });

    poll();
    setInterval(poll, 1000); /*toutes les secondes poll est exectuée pour actualiser les messages*/
  </script>
</body>
</html>
